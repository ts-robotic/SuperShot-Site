name: secret-scan

# Secret-scan gate. Runs gitleaks over the repository on every push and
# pull request and fails the job on any finding. Fail-closed: an install
# error, a git error, a config error or a leak all exit non-zero and block
# the build. Secret values are redacted in the logs and never printed.

on:
  push:
  pull_request:

permissions:
  contents: read

# Security gate: do not cancel an in-flight scan when a new commit arrives.
# A cancelled run is neither pass nor fail; serialise instead of cancelling.
concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Block committed key material and keystores
        run: |
          set -euo pipefail
          # gitleaks skips binary blobs, so binary keystores (.pfx/.p12/.jks)
          # evade content scanning. Catch them by filename across all history
          # (a file deleted from HEAD still lives in the git history blobs).
          # Fail closed: a git error aborts the job; only a genuine no-match passes.
          if ! names="$(git log --all --pretty=format: --name-only --diff-filter=A)"; then
            echo "::error::git log failed during keystore scan"
            exit 1
          fi
          set +e
          hits="$(printf '%s\n' "$names" | grep -iE '\.(pfx|p12|p8|jks|keystore)$' | sort -u)"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            echo "::error::keystore filename scan failed (grep exit $rc)"
            exit 1
          fi
          if [ -n "$hits" ]; then
            echo "::error::Key material / keystore files present in history; must not be committed:"
            printf '%s\n' "$hits"
            exit 1
          fi
          echo "No key material / keystore files found in history."

      - name: Install gitleaks (version + checksum pinned)
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl --fail --silent --show-error --location "$url" -o /tmp/gitleaks.tgz
          echo "${GITLEAKS_LINUX_X64_SHA256}  /tmp/gitleaks.tgz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: |
          set -euo pipefail
          # Defence in depth: gitleaks git returns 0 ("no leaks") on a
          # non-git path, so confirm we are in a real work tree first.
          git rev-parse --is-inside-work-tree >/dev/null
          gitleaks git . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            --log-opts="--all"
